<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>単項式コード5 - 天下統一【極・完遂】</title>
  <style>
    :root {
      --bg: radial-gradient(circle at top, #1a1a1a 0%, #000000 100%);
      --panel: rgba(30, 41, 59, 0.95);
      --line: rgba(245, 158, 11, 0.3);
      --text: #f8fafc;
      --sub: #94a3b8;
      --accent: #f59e0b; 
      --accent-2: #38bdf8;
      --ok: #22c55e;
      --ng: #fb7185;
      --radius: 20px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Hiragino Sans", "Meiryo", sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; width: 100vw; }
    .frac-container { display: inline-flex; flex-direction: column; vertical-align: middle; text-align: center; font-size: 0.85em; margin: 0 6px; line-height: 1.1; }
    .frac-num { border-bottom: 2px solid var(--text); padding: 0 6px; }
    .frac-den { padding: 0 6px; }
    .term-wrapper { display: inline-flex; align-items: center; justify-content: center; }
    .app { height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .shell { width: min(1200px, 100%); height: min(850px, 95vh); background: rgba(10, 10, 10, 0.98); border: 2px solid var(--line); border-radius: 30px; display: grid; grid-template-columns: 300px 1fr; overflow: hidden; box-shadow: 0 0 100px rgba(245, 158, 11, 0.2); }
    aside { background: rgba(20, 20, 20, 0.8); padding: 30px; border-right: 1px solid var(--line); display: flex; flex-direction: column; gap: 20px; }
    h1 { font-size: 20px; margin: 0; color: var(--accent); letter-spacing: 2px; text-align: center; font-weight: 900; text-shadow: 0 0 10px var(--accent); }
    .card { background: #1a1a1a; border: 1px solid var(--line); border-radius: var(--radius); padding: 15px; }
    .label { font-size: 11px; color: var(--sub); margin-bottom: 4px; font-weight: bold; }
    .stat-row { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 4px; font-size: 16px; }
    .stage-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .stage-btn { position: relative; background: #262626; border: none; color: white; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .stage-btn.active { background: var(--accent) !important; color: #000 !important; box-shadow: 0 0 15px var(--accent); }
    .stage-btn.locked { opacity: 0.15; cursor: not-allowed; }
    .kamon { position: absolute; bottom: -5px; right: -5px; width: 18px; height: 18px; background: var(--ok); border-radius: 50%; border: 2px solid #000; display: flex; align-items: center; justify-content: center; }
    .kamon::after { content: ''; width: 8px; height: 4px; border-left: 2px solid #000; border-bottom: 2px solid #000; transform: rotate(-45deg); margin-top: -2px; }
    main { padding: 40px; display: flex; flex-direction: column; gap: 20px; position: relative; overflow-y: auto; }
    .status-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
    .chip { background: #1a1a1a; border: 1px solid var(--line); padding: 10px; border-radius: 12px; text-align: center; }
    .chip strong { display: block; font-size: 18px; color: var(--accent); }
    .screen { display: none; flex-direction: column; gap: 20px; height: 100%; }
    .screen.active { display: flex; }
    .problem-box { background: #000; flex-grow: 1; display: flex; align-items: center; justify-content: center; border-radius: 25px; border: 2px solid var(--accent); font-size: 56px; font-weight: bold; box-shadow: inset 0 0 30px rgba(245, 158, 11, 0.1); }
    .option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .option { background: #111; border: 1px solid #333; padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 12px; min-height: 85px; }
    .opt-idx { background: #333; color: var(--accent); width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; font-size: 18px; flex-shrink: 0; }
    .opt-val { font-size: 26px; flex-grow: 1; text-align: center; }
    .num-btn { background: #262626; border: none; color: white; padding: 15px; border-radius: 10px; font-size: 24px; cursor: pointer; }
    .digit { width: 45px; height: 60px; background: #000; border: 2px solid var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; color: var(--accent); }
    .btn { padding: 15px 25px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 18px; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-action { background: var(--ok); color: #000; width: 100%; font-size: 22px; box-shadow: 0 5px 15px rgba(34, 197, 94, 0.3); }
    .btn-exit { background: #450a0a; color: #fff; margin-top: auto; border: 1px solid #991b1b; }
    .shogun-title { font-size: 60px; color: var(--accent); font-weight: 900; text-shadow: 0 0 30px var(--accent); animation: shogun-glow 2.5s infinite; margin: 20px 0; }
    @keyframes shogun-glow { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } }
    .sakura-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; display: none; }
    .sakura { position: absolute; background: #ffd700; border-radius: 50% 0 50% 50%; animation: sakura-fall linear infinite; }
    @keyframes sakura-fall { 0% { transform: translateY(-10vh) rotate(0deg); } 100% { transform: translateY(110vh) rotate(1080deg); } }
    sup { font-size: 0.5em; vertical-align: top; }
  </style>
</head>
<body>
<div id="sakuraContainer" class="sakura-container"></div>
<div class="app">
  <div class="shell">
    <aside>
      <h1>単項式コード5【極】</h1>
      <div class="card">
        <div class="label">最高記録</div>
        <div class="stat-row"><span>最高戦功</span><span id="bestScore">0</span></div>
        <div class="stat-row"><span>最高階級</span><span id="bestRank" style="color:var(--accent);">足軽</span></div>
      </div>
      <div class="card"><div class="label">戦場選択</div><div id="stageGrid" class="stage-grid"></div></div>
      <button class="btn btn-exit" onclick="exitGame()">戦線離脱</button>
    </aside>
    <main>
      <div class="status-bar">
        <div class="chip"><span class="label">刻限</span><strong id="timer">02:00</strong></div>
        <div class="chip"><span class="label">累計戦功</span><strong id="totalScore">0</strong></div>
        <div class="chip" id="rankChipParent"><span class="label">階級</span><strong id="rankChip">足軽</strong></div>
        <div class="chip"><span class="label">戦場</span><strong id="stageNum">1</strong></div>
      </div>
      <section id="homeScreen" class="screen active">
        <div class="card" style="padding:40px; text-align:center; border:2px dashed var(--accent); flex-grow:1; display:flex; flex-direction:column; justify-content:center;">
          <h2 style="font-size:38px; color:var(--accent); margin-bottom:10px;">強者ども、集え。</h2>
          <p style="color:var(--sub); line-height:2; font-size:16px; margin-bottom:25px;">これより先は、真の計算力が試される「極」の戦場なり。<br>正確なカッコの扱いこそが、勝利への鍵となる。<br>天下の頂点を目指し、いざ出陣。</p>
          <button class="btn btn-primary" style="font-size:24px; padding:20px 70px;" onclick="startGameSession()">門を開く</button>
        </div>
      </section>
      <section id="problemScreen" class="screen">
        <div style="display:flex; justify-content:space-between; align-items:center;"><h2 id="probMeta" style="margin:0; font-size:22px;">第1問 / 5</h2><div id="progBar" style="display:flex; gap:10px;"></div></div>
        <div id="problemDisplay" class="problem-box"></div>
        <button class="btn btn-primary" style="width:100%; font-size:22px;" onclick="nextProblem()">次へ進む</button>
      </section>
      <section id="answerScreen" class="screen">
        <div style="display:grid; grid-template-columns:1fr 320px; gap:20px; flex-grow:1;">
          <div class="card" style="display:flex; flex-direction:column;"><div class="label" style="display:flex; justify-content:space-between; align-items:center;"><span>暗号の札</span><button class="btn" style="background:#444; color:#ccc; font-size:11px;" onclick="resetToProblem()">⚠ やりなおし</button></div><div id="optionGrid" class="option-grid" style="margin-top:10px;"></div></div>
          <div style="display:flex; flex-direction:column; gap:15px;"><div class="card" style="border-color:var(--accent);"><div class="label" style="text-align:center;">入力中の暗号</div><div id="codeDisplay" style="display:flex; justify-content:center; gap:8px;"></div><div id="numpad" style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:10px;"></div></div><button class="btn btn-action" onclick="judge()">判定を仰ぐ</button><button class="btn" style="background:#333; color:white;" onclick="backSpace()">一文字消す</button></div>
        </div>
      </section>
      <section id="resultScreen" class="screen">
        <div id="resultCard" class="result-card" style="flex-grow:1; display:flex; flex-direction:column; justify-content:center;"><h2 id="resultTitle"></h2><div id="bonusDisplay" style="font-size:24px; color:var(--accent); font-weight:bold; margin-bottom:10px;"></div><p id="resultMsg"></p><div id="correctCodeDisplay" style="font-size:42px; letter-spacing:12px; margin:20px 0; font-weight:bold; font-family:monospace; color:var(--accent);"></div><div style="display:flex; gap:15px; justify-content:center;"><button id="nextStageBtn" class="btn" style="display:none; background:var(--ok); color:#000;" onclick="nextStage()">次なる戦地へ</button><button class="btn btn-primary" onclick="startStage()">再出陣</button><button class="btn" style="background:#333; color:white;" onclick="goHome()">本陣へ戻る</button></div></div>
      </section>
    </main>
  </div>
</div>
<script>
const STORAGE_KEY = 'sengoku_math_vKIWAMI_PAREN';
let state = { stage: 1, reached: 1, streak: 0, bestStreak: 0, score: 0, bestScore: 0, bestRank: "足軽", qIdx: 0, timer: 120, timerId: null, currentSet: { code: [], probs: [] }, input: [] };

const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);
function normFrac(n, d) { const common = Math.abs(gcd(n, d)); let nn = n/common, dd = d/common; if(dd < 0) { nn=-nn; dd=-dd; } return {n:nn, d:dd}; }
const toSup = (n) => String(n).split('').map(c => ({'0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵'}[c] || c)).join('');

// --- 表示ロジック（カッコ対応強化版） ---
function formatTerm(term, forceParen = false) {
  const c = term.coeff; if(c.n === 0) return "0";
  const vars = Object.keys(term.vars).filter(k => term.vars[k] !== 0).sort();
  let numVarStr = "", denVarStr = "";
  vars.forEach(v => {
    const p = term.vars[v];
    if(p > 0) numVarStr += v + (p === 1 ? "" : toSup(p));
    else denVarStr += v + (Math.abs(p) === 1 ? "" : toSup(Math.abs(p)));
  });
  
  const isNegative = c.n < 0;
  let h = `<span class="term-wrapper">`;
  
  // カッコが必要なケース：負の数かつ forceParen が true
  if (isNegative && forceParen) h += `(`;
  if (isNegative) h += `−`;
  
  const n = Math.abs(c.n), d = c.d;
  if(d === 1 && denVarStr === "") {
    if(n === 1 && numVarStr !== "") h += numVarStr; else h += n + numVarStr;
  } else {
    h += `<div class="frac-container">
            <div class="frac-num">${(n===1 && numVarStr!=="") ? numVarStr : n+numVarStr}</div>
            <div class="frac-den">${(d===1 && denVarStr!=="") ? denVarStr : d+denVarStr}</div>
          </div>`;
  }
  
  if (isNegative && forceParen) h += `)`;
  return h + `</span>`;
}

function mul(a, b) {
  const c = normFrac(a.coeff.n * b.coeff.n, a.coeff.d * b.coeff.d);
  const v = {}; const keys = new Set([...Object.keys(a.vars), ...Object.keys(b.vars)]);
  keys.forEach(k => { const p = (a.vars[k]||0) + (b.vars[k]||0); if(p!==0) v[k]=p; });
  return {coeff:c, vars:v};
}
function div(a, b) {
  const c = normFrac(a.coeff.n * b.coeff.d, a.coeff.d * b.coeff.n);
  const v = {}; const keys = new Set([...Object.keys(a.vars), ...Object.keys(b.vars)]);
  keys.forEach(k => { const p = (a.vars[k]||0) - (b.vars[k]||0); if(p!==0) v[k]=p; });
  return {coeff:c, vars:v};
}

function generateKiwamiProblem(s, vIdx) {
  const chars = ['x', 'y', 'a', 'b'];
  const char = chars[vIdx % 4];
  const char2 = chars[(vIdx + 1) % 4];
  const randC = (m, x) => Math.floor(Math.random()*(x-m+1)+m) * (Math.random()>0.5?1:-1);

  let t1, t2, t3, ans, expr;
  switch(vIdx % 5) {
    case 0: // 符号・カッコ強化型 -(A)^2 ÷ (-B)
      t1={coeff:{n:randC(2,3),d:1}, vars:{[char]:1}}; t2={coeff:{n:randC(-4,-2),d:1}, vars:{[char]:1}};
      ans = div(mul(t1,t1), t2); ans.coeff.n *= -1;
      expr = `−(${formatTerm(t1)})² ÷ ${formatTerm(t2, true)}`; break;
    case 1: // 指数カッコ型 A ÷ (B^2)
      t1={coeff:{n:randC(2,6),d:1}, vars:{[char]:1}}; t2={coeff:{n:randC(-3,3),d:1}, vars:{[char]:1}}; if(t2.coeff.n===0) t2.coeff.n=2;
      ans = div(t1, mul(t2,t2)); expr = `${formatTerm(t1)} ÷ (${formatTerm(t2)})²`; break;
    case 2: // 連続除法 A ÷ B ÷ C
      t1={coeff:{n:randC(12,24),d:1}, vars:{[char]:2}}; t2={coeff:normFrac(1,2), vars:{[char]:1}}; t3={coeff:{n:randC(-3,-2),d:1}, vars:{[char2]:1}};
      ans = div(div(t1,t2),t3); expr = `${formatTerm(t1)} ÷ ${formatTerm(t2)} ÷ ${formatTerm(t3, true)}`; break;
    case 3: // 異文字混合 3項 A ÷ (-B) * C
      t1={coeff:{n:randC(6,12),d:1}, vars:{[char]:1,[char2]:1}}; t2={coeff:{n:randC(-3,-2),d:1}, vars:{[char]:1}}; t3={coeff:{n:randC(2,3),d:1}, vars:{[char2]:1}};
      ans = mul(div(t1,t2),t3); expr = `${formatTerm(t1)} ÷ ${formatTerm(t2, true)} × ${formatTerm(t3)}`; break;
    case 4: // 複雑分数
      t1={coeff:normFrac(randC(1,2), 3), vars:{[char]:2}}; t2={coeff:normFrac(randC(-3,-1), 2), vars:{[char]:1}}; t3={coeff:{n:randC(1,2),d:1}, vars:{[char]:2}};
      ans = div(mul(t1,t2),t3); expr = `${formatTerm(t1)} × ${formatTerm(t2, true)} ÷ ${formatTerm(t3)}`; break;
  }
  return {ans, expr};
}

function buildSet() {
  const probs = [], ansStrings = new Set();
  while(probs.length < 5) {
    const p = generateKiwamiProblem(state.stage, probs.length);
    const html = formatTerm(p.ans);
    if(!ansStrings.has(html)) { probs.push(p); ansStrings.add(html); }
  }
  const optionsArray = Array.from(ansStrings);
  while(optionsArray.length < 10) {
    const dummy = formatTerm(generateKiwamiProblem(1, Math.floor(Math.random()*100)).ans);
    if(!optionsArray.includes(dummy)) optionsArray.push(dummy);
  }
  const shuffled = optionsArray.sort(() => Math.random() - 0.5);
  return { probs, options: shuffled, code: Array.from(ansStrings).map(h => shuffled.indexOf(h)) };
}

function startGameSession() { try { document.documentElement.requestFullscreen().catch(()=>{}); } catch(e){} startStage(); }
function startStage() {
  clearInterval(state.timerId); state.qIdx = 0; state.input = []; state.timer = 120;
  state.currentSet = buildSet(); showScreen('problemScreen'); renderProblem(); startTimer(); updateUI(); renderStages();
}
function renderProblem() {
  const p = state.currentSet.probs[state.qIdx]; if(!p) return;
  document.getElementById('probMeta').innerText = `第 ${state.qIdx + 1} 陣 / 5`;
  document.getElementById('problemDisplay').innerHTML = p.expr;
  const pb = document.getElementById('progBar'); pb.innerHTML = '';
  for(let i=0; i<5; i++) {
    const d = document.createElement('div'); d.style.width='15px'; d.style.height='15px'; d.style.borderRadius='50%';
    d.style.background = i <= state.qIdx ? 'var(--accent)' : '#333'; pb.appendChild(d);
  }
}
function nextProblem() { if(state.qIdx < 4) { state.qIdx++; renderProblem(); } else { showScreen('answerScreen'); renderAnswerScreen(); } }
function renderAnswerScreen() {
  const g = document.getElementById('optionGrid'); g.innerHTML = '';
  state.currentSet.options.forEach((h, i) => {
    const d = document.createElement('div'); d.className = 'option'; d.innerHTML = `<div class="opt-idx">${i}</div><div class="opt-val">${h}</div>`; g.appendChild(d);
  });
  const pad = document.getElementById('numpad'); pad.innerHTML = '';
  [1,2,3,4,5,6,7,8,9,0].forEach(n => {
    const b = document.createElement('button'); b.className = 'num-btn'; b.innerText = n; b.onclick = () => { if(state.input.length < 5) { state.input.push(n); updateCode(); } }; pad.appendChild(b);
  });
  updateCode();
}
function updateCode() {
  const d = document.getElementById('codeDisplay'); d.innerHTML = '';
  for(let i=0; i<5; i++) { const v = document.createElement('div'); v.className = 'digit'; v.innerText = state.input[i] ?? ''; d.appendChild(v); }
}
function backSpace() { state.input.pop(); updateCode(); }
function judge() {
  if(state.input.length < 5) return; clearInterval(state.timerId);
  const correct = state.input.join('') === state.currentSet.code.join('');
  showScreen('resultScreen');
  if(correct) {
    const bonus = state.timer * 20; state.score += (2000 + bonus);
    state.bestScore = Math.max(state.bestScore, state.score);
    state.streak++; if(state.stage === state.reached && state.reached < 6) state.reached++;
    document.getElementById('resultCard').className = 'result-card win';
    if(state.stage === 6) { document.getElementById('resultTitle').innerHTML = '<div class="shogun-title">征夷大将軍・極</div>'; startSakura(); }
    else { document.getElementById('resultTitle').innerText = '見事なり！'; document.getElementById('nextStageBtn').style.display='block'; }
    document.getElementById('bonusDisplay').innerText = `戦功ボーナス: +${bonus}！`;
  } else {
    state.streak = 0; state.score = 0; document.getElementById('resultCard').className = 'result-card lose';
    document.getElementById('resultTitle').innerText = '不覚…！'; document.getElementById('nextStageBtn').style.display='none';
  }
  document.getElementById('correctCodeDisplay').innerText = state.currentSet.code.join(' ');
  saveRecords(); updateUI(); renderStages();
}
function startTimer() { state.timerId = setInterval(() => { state.timer--; const m = String(Math.floor(state.timer/60)).padStart(2,'0'), s = String(state.timer%60).padStart(2,'0'); document.getElementById('timer').innerText = `${m}:${s}`; if(state.timer <= 0) { clearInterval(state.timerId); judge(); } }, 1000); }
function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function updateUI() {
  document.getElementById('bestScore').innerText = state.bestScore;
  document.getElementById('totalScore').innerText = state.score;
  const r = getRank(state.streak, state.stage, state.reached);
  document.getElementById('rankChip').innerText = r; document.getElementById('bestRank').innerText = state.bestRank;
  document.getElementById('stageNum').innerText = state.stage;
}
function renderStages() {
  const g = document.getElementById('stageGrid'); g.innerHTML = '';
  for(let i=1; i<=6; i++) {
    const b = document.createElement('button'); b.className = 'stage-btn'; b.innerText = i;
    if(i > state.reached) b.classList.add('locked');
    else { if(i === state.stage) b.classList.add('active'); if(i < state.reached) { const k = document.createElement('div'); k.className = 'kamon'; b.appendChild(k); }
      b.onclick = () => { state.stage = i; updateUI(); renderStages(); };
    } g.appendChild(b);
  }
}
function getRank(s, stage, reached) { if(reached>6) return "征夷大将軍"; if(stage>=6) return "天下人"; if(stage>=5) return "家老"; if(stage>=4) return "宿老"; if(stage>=3) return "侍大将"; return "足軽"; }
function saveRecords() { try { const curRank = getRank(state.streak, state.stage, state.reached); const ranks = ["足軽", "侍大将", "宿老", "家老", "天下人", "征夷大将軍"]; if (ranks.indexOf(curRank) > ranks.indexOf(state.bestRank)) state.bestRank = curRank; localStorage.setItem(STORAGE_KEY, JSON.stringify({ bestScore: state.bestScore, bestRank: state.bestRank, reached: state.reached })); } catch(e){} }
function loadRecords() { try { const d = localStorage.getItem(STORAGE_KEY); if (d) { Object.assign(state, JSON.parse(d)); state.stage = state.reached; } } catch(e){} }
function exitGame() { if(confirm("終了しますか？")) { clearInterval(state.timerId); if(document.fullscreenElement) document.exitFullscreen(); showScreen('homeScreen'); } }
function goHome() { showScreen('homeScreen'); }
function resetToProblem() { state.qIdx = 0; state.input = []; showScreen('problemScreen'); renderProblem(); }
function nextStage() { if(state.stage < 6) { state.stage++; startStage(); } }
function startSakura() { const c = document.getElementById('sakuraContainer'); c.innerHTML = ''; c.style.display = 'block'; for(let i=0; i<60; i++) { const s = document.createElement('div'); s.className = 'sakura'; s.style.left = Math.random()*100+'vw'; s.style.width = s.style.height = (Math.random()*10+5)+'px'; s.style.animationDuration = (Math.random()*3+2)+'s'; c.appendChild(s); } }
window.onload = () => { loadRecords(); renderStages(); updateUI(); };
</script>
</body>
</html>
